<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copacabana</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- The map container — Leaflet will render into this div -->
  <div id="map"></div>

  <!-- Floating control bar -->
  <div id="controls">

    <!-- Zoom +/− pair inside a single frosted pill -->
    <div id="zoom-wrap" class="glass">
      <button class="zoom-btn" id="btn-zoom-in"  title="Zoom in">+</button>
      <div class="zoom-divider"></div>
      <button class="zoom-btn" id="btn-zoom-out" title="Zoom out">−</button>
    </div>

    <!-- Re-center button: flies back to the default view -->
    <button class="ctrl-btn glass" id="btn-locate">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
      Re-center
    </button>

    <!-- Fullscreen toggle button -->
    <button class="ctrl-btn glass" id="btn-fs">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" id="fs-svg">
        <path id="fs-path" d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
      <span id="fs-label">Fullscreen</span>
    </button>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>

    /* ── 1. Map setup ─────────────────────────────────────────────────────────
       Create the map centered on Copacabana beach.
       zoomControl and attributionControl are disabled because we have our own UI. */
    var CENTER = [-22.9800, -43.1950];

    var map = L.map('map', {
      zoomControl: false,
      attributionControl: false
    }).setView(CENTER, 15);


    /* ── 2. Satellite tile layer (Esri World Imagery) ─────────────────────────
       Free public endpoint — no API key required.
       Tiles arrive as {z}/{y}/{x} (zoom / row / column). */
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 19 }
    ).addTo(map);


    /* ── 3. Custom pin icon ───────────────────────────────────────────────────
       L.divIcon lets us use arbitrary HTML/SVG as a marker.
       iconAnchor places the tip of the pin exactly on the coordinate.
       popupAnchor offsets the popup above the pin head. */
    function makePin(color) {
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">'
        + '<path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="' + color + '"/>'
        + '<circle cx="16" cy="16" r="7" fill="white"/>'
        + '<circle cx="16" cy="16" r="4" fill="' + color + '"/>'
        + '</svg>';

      return L.divIcon({
        html: svg,
        className: 'custom-pin',
        iconSize:    [32, 40],
        iconAnchor:  [16, 40],  /* horizontal center, bottom tip */
        popupAnchor: [0, -48]   /* above the pin */
      });
    }

    var projects = [
    {
      name: "B.Rio Paul Redfern",
      desc: "Rua Paul Redfern, 41 - Ipanema",
      coords: [-22.9836, -43.2140],
      url: "/projects/paul-redfern.html"
    },
    {
      name: "B.Rio Pompeu Loureiro",
      desc: "Rua Pompeu Loureiro - Copacabana",
      coords: [-22.9749, -43.1917],
      url: "/projects/pompeu.html"
    }
    ];

    // Loop through the data to build your markers
    projects.forEach(function(project) {
    L.marker(project.coords, { icon: makePin(bikeRioColor), title: project.name }) // Added title for accessibility!
      .addTo(map)
      .bindPopup('<strong>' + project.name + '</strong><em>' + project.desc + '</em>')
      .on('click', function() {
          // Direct navigation on click
          // window.location.href = project.url; 
          map.flyTo(e.latlng, 16, {duration: animSpeed}); 
      });
    });


/* ── 4. Markers ───────────────────────────────────────────────────────────
       Bike Rio (Bike Itaú) Stations in Ipanema and Copacabana.
       Using the signature orange color for the pins. */

    var bikeRioColor = '#ec7000'; // Itaú Orange
    var animSpeed = 1.0;

    /* Pin 3 — B.Rio Barão de Jaguaripe */
    L.marker([-22.9829, -43.2084], { icon: makePin(bikeRioColor) })
      .addTo(map)
      .bindPopup('<strong>B.Rio Barão de Jaguaripe</strong><em>Rua Barão de Jaguaripe, 404 - Ipanema</em>')
      .on('click', function(e) {
        // e.latlng contains the exact coordinates of the clicked pin
        // 16 is the target zoom level
        map.flyTo(e.latlng, 19, {duration: animSpeed}); 
      });

    /* Pin 4 — B.Rio Prudente */
    L.marker([-22.9845, -43.2033], { icon: makePin(bikeRioColor) })
      .addTo(map)
      .bindPopup('<strong>B.Rio Prudente</strong><em>Rua Prudente de Moraes, 589 - Ipanema</em>')
      .on('click', function(e) {
        // e.latlng contains the exact coordinates of the clicked pin
        // 16 is the target zoom level
        map.flyTo(e.latlng, 19, {duration: animSpeed}); 
      });

    /* Pin 5 — B.Rio Barão da Torre */
    L.marker([-22.9838, -43.2047], { icon: makePin(bikeRioColor) })
      .addTo(map)
      .bindPopup('<strong>B.Rio Barão da Torre</strong><em>Rua Barão da Torre - Ipanema</em>')
      .on('click', function(e) {
        // e.latlng contains the exact coordinates of the clicked pin
        // 16 is the target zoom level
        map.flyTo(e.latlng, 19, {duration: animSpeed}); 
      });

    /* Pin 6 — B.Rio Leopoldo Miguez */
    L.marker([-22.9757, -43.1696], { icon: makePin(bikeRioColor) })
      .addTo(map)
      .bindPopup('<strong>B.Rio Leopoldo Miguez</strong><em>Rua Leopoldo Miguez, 10 - Copacabana</em>')
      .on('click', function(e) {
        // e.latlng contains the exact coordinates of the clicked pin
        // 16 is the target zoom level
        map.flyTo(e.latlng, 19, {duration: animSpeed}); 
      });

    /* Pin 7 — B.Rio Tonelero */
    L.marker([-22.9663, -43.1642], { icon: makePin(bikeRioColor) })
      .addTo(map)
      .bindPopup('<strong>B.Rio Tonelero</strong><em>Rua Tonelero, 61 - Copacabana</em>')
      .on('click', function(e) {
        // e.latlng contains the exact coordinates of the clicked pin
        // 16 is the target zoom level
        map.flyTo(e.latlng, 16, {duration: animSpeed}); 
      });

    /* Pin 8 — B.Rio Arpoador */
    L.marker([-22.9883, -43.1913], { icon: makePin(bikeRioColor) })
      .addTo(map)
      .bindPopup('<strong>B.Rio Arpoador</strong><em>Arpoador</em>')
      .on('click', function(e) {
        // e.latlng contains the exact coordinates of the clicked pin
        // 16 is the target zoom level
        map.flyTo(e.latlng, 16, {duration: animSpeed}); 
      });

    /* Pin 9 — B.Rio Nascimento Silva */
    L.marker([-22.9835, -43.2057], { icon: makePin(bikeRioColor) })
      .addTo(map)
      .bindPopup('<strong>B.Rio Nascimento Silva</strong><em>Rua Nascimento Silva - Ipanema</em>')
      .on('click', function(e) {
        // e.latlng contains the exact coordinates of the clicked pin
        // 16 is the target zoom level
        map.flyTo(e.latlng, 16, {duration: animSpeed}); 
      });


    /* ── 5. Zoom controls ─────────────────────────────────────────────────────
       Calling map.zoomIn() / map.zoomOut() mirrors what Leaflet's
       built-in zoom control does internally. */
    document.getElementById('btn-zoom-in').addEventListener('click', function () {
      map.zoomIn();
    });

    document.getElementById('btn-zoom-out').addEventListener('click', function () {
      map.zoomOut();
    });


    /* ── 6. Re-center button ──────────────────────────────────────────────────
       Flies the camera back to the original CENTER coordinate and zoom level. */
    document.getElementById('btn-locate').addEventListener('click', function () {
      map.setView(CENTER, 15);
    });


    /* ── 7. Fullscreen toggle ─────────────────────────────────────────────────
       Uses the browser Fullscreen API (requestFullscreen / exitFullscreen).
       After toggling, map.invalidateSize() forces Leaflet to recalculate
       the viewport dimensions so tiles don't go blank. */
    var fsBtn   = document.getElementById('btn-fs');
    var fsLabel = document.getElementById('fs-label');
    var fsPath  = document.getElementById('fs-path');

    var ENTER_FS = 'M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3';
    var EXIT_FS  = 'M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3';

    fsBtn.addEventListener('click', function () {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
      /* give the browser a moment to resize before Leaflet measures the div */
      setTimeout(function () { map.invalidateSize(); }, 300);
    });

    /* sync icon and label when fullscreen state changes (e.g. user presses Esc) */
    document.addEventListener('fullscreenchange', function () {
      var isFs = !!document.fullscreenElement;
      fsPath.setAttribute('d', isFs ? EXIT_FS : ENTER_FS);
      fsLabel.textContent = isFs ? 'Exit fullscreen' : 'Fullscreen';
    });

  </script>
</body>
</html>
