<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copacabana</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- The map container — Leaflet will render into this div -->
    <div id="map"></div>

    <!-- Floating control bar -->
    <div id="controls">
      <!-- Zoom +/− pair inside a single frosted pill -->
      <div id="zoom-wrap" class="glass">
        <button class="zoom-btn" id="btn-zoom-in" title="Zoom in">+</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" id="btn-zoom-out" title="Zoom out">−</button>
      </div>

      <!-- Re-center button: flies back to the default view -->
      <button class="ctrl-btn glass" id="btn-locate">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3" />
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
        </svg>
        Re-center
      </button>

      <!-- Fullscreen toggle button -->
      <button class="ctrl-btn glass" id="btn-fs">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
          id="fs-svg"
        >
          <path
            id="fs-path"
            d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"
          />
        </svg>
        <span id="fs-label">Fullscreen</span>
      </button>
    </div>

    <div id="project-panel">
      <button id="close-panel-btn" class="glass">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <iframe id="project-frame" src=""></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
      /* ── 1. Map setup ─────────────────────────────────────────────────────────
       Create the map centered on Copacabana beach.
       zoomControl and attributionControl are disabled because we have our own UI. */
      var CENTER = [-22.98, -43.195];

      var map = L.map("map", {
        zoomControl: false,
        attributionControl: false,
      }).setView(CENTER, 15);

      /* ── 2. Satellite tile layer (Esri World Imagery) ─────────────────────────
       Free public endpoint — no API key required.
       Tiles arrive as {z}/{y}/{x} (zoom / row / column). */
      L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19 },
      ).addTo(map);

      /* ── 3. Custom pin icon ───────────────────────────────────────────────────
       L.divIcon lets us use arbitrary HTML/SVG as a marker.
       iconAnchor places the tip of the pin exactly on the coordinate.
       popupAnchor offsets the popup above the pin head. */
      function makePin(color) {
        var svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">' +
          '<path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="' +
          color +
          '"/>' +
          '<circle cx="16" cy="16" r="7" fill="white"/>' +
          '<circle cx="16" cy="16" r="4" fill="' +
          color +
          '"/>' +
          "</svg>";

        return L.divIcon({
          html: svg,
          className: "custom-pin",
          iconSize: [32, 40],
          iconAnchor: [16, 40] /* horizontal center, bottom tip */,
          popupAnchor: [0, -48] /* above the pin */,
        });
      }
      /* ── 4. Markers & Data (JSON Approach) ────────────────────────────────────
       Store all project data in an array of objects. 
       This makes adding new pins incredibly easy. */

      var bikeRioColor = "#ec7000"; // Itaú Orange

      var projectsData = [
        {
          title: "B.Rio Paul Redfern",
          address: "Rua Paul Redfern, 41 - Ipanema",
          coords: [-22.9836, -43.214],
          preview: "path_to_image",
          url: "https://en.wikipedia.org/wiki/Ipanema",
          content: {
            galery: "path_to_folder_with_images",
            squareMeter: 45,
            floorPlan: "path_to_floor_plan.png", // estou so inventando complete com algumas infos, quero focar na infraestrutura tech nao no conteudo ainda emsi.
          }

        },
        {
          title: "B.Rio Pompeu Loureiro",
          address: "Rua Pompeu Loureiro - Copacabana",
          coords: [-22.9749, -43.1917],
          url: "https://en.wikipedia.org/wiki/Copacabana",
        },
        {
          title: "B.Rio Barão de Jaguaripe",
          address: "Rua Barão de Jaguaripe, 404 - Ipanema",
          coords: [-22.9829, -43.2084],
          url: "https://en.wikipedia.org/wiki/Ipanema",
        },
        {
          title: "B.Rio Prudente",
          address: "Rua Prudente de Moraes, 589 - Ipanema",
          coords: [-22.9845, -43.2033],
          url: "https://en.wikipedia.org/wiki/Ipanema",
        },
        {
          title: "B.Rio Barão da Torre",
          address: "Rua Barão da Torre - Ipanema",
          coords: [-22.9838, -43.2047],
          url: "https://en.wikipedia.org/wiki/Ipanema",
        },
        {
          title: "B.Rio Leopoldo Miguez",
          address: "Rua Leopoldo Miguez, 10 - Copacabana",
          coords: [-22.9757, -43.1896],
          url: "https://en.wikipedia.org/wiki/Copacabana",
        },
        {
          title: "B.Rio Tonelero",
          address: "Rua Tonelero, 61 - Copacabana",
          coords: [-22.9663, -43.1842],
          url: "https://en.wikipedia.org/wiki/Copacabana",
        },
        {
          title: "B.Rio Arpoador",
          address: "Arpoador",
          coords: [-22.9883, -43.1913],
          url: "https://en.wikipedia.org/wiki/Arpoador",
        },
        {
          title: "B.Rio Nascimento Silva",
          address: "Rua Nascimento Silva - Ipanema",
          coords: [-22.9835, -43.2057],
          url: "https://en.wikipedia.org/wiki/Ipanema",
        },
      ];

      // Grab our panel DOM elements
      var projectPanel = document.getElementById("project-panel");
      var projectFrame = document.getElementById("project-frame");
      var closePanelBtn = document.getElementById("close-panel-btn");

      // Loop through the array and create a marker for each object
      projectsData.forEach(function (project) {
        L.marker(project.coords, {
          icon: makePin(bikeRioColor),
          title: project.title,
        })
          .addTo(map)
          .bindPopup(
            "<strong>" +
              project.title +
              "</strong><em>" +
              project.address +
              "</em>",
          )
          .on("click", function (e) {
            // 1. Zoom in a little bit (ensures a minimum zoom of 16)
            var currentZoom = map.getZoom();
            map.flyTo(e.latlng, Math.max(currentZoom, 16), { duration: 0.6 });

            // 2. Load the project URL into the iframe
            projectFrame.src = project.url;

            // 3. Slide the panel open
            projectPanel.classList.add("panel-open");
          });
      });

      // Handle closing the panel
      closePanelBtn.addEventListener("click", function () {
        projectPanel.classList.remove("panel-open");

        // Optional: clear the iframe source after the animation finishes (450ms)
        // This stops background audio/video from continuing to play after closing
        setTimeout(function () {
          projectFrame.src = "";
        }, 450);
      });

      /* ── 5. Zoom controls ─────────────────────────────────────────────────────
       Calling map.zoomIn() / map.zoomOut() mirrors what Leaflet's
       built-in zoom control does internally. */
      document
        .getElementById("btn-zoom-in")
        .addEventListener("click", function () {
          map.zoomIn();
        });

      document
        .getElementById("btn-zoom-out")
        .addEventListener("click", function () {
          map.zoomOut();
        });

      /* ── 6. Re-center button ──────────────────────────────────────────────────
       Flies the camera back to the original CENTER coordinate and zoom level. */
      document
        .getElementById("btn-locate")
        .addEventListener("click", function () {
          map.setView(CENTER, 15);
        });

      /* ── 7. Fullscreen toggle ─────────────────────────────────────────────────
       Uses the browser Fullscreen API (requestFullscreen / exitFullscreen).
       After toggling, map.invalidateSize() forces Leaflet to recalculate
       the viewport dimensions so tiles don't go blank. */
      var fsBtn = document.getElementById("btn-fs");
      var fsLabel = document.getElementById("fs-label");
      var fsPath = document.getElementById("fs-path");

      var ENTER_FS =
        "M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3";
      var EXIT_FS =
        "M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3";

      fsBtn.addEventListener("click", function () {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
        /* give the browser a moment to resize before Leaflet measures the div */
        setTimeout(function () {
          map.invalidateSize();
        }, 300);
      });

      /* sync icon and label when fullscreen state changes (e.g. user presses Esc) */
      document.addEventListener("fullscreenchange", function () {
        var isFs = !!document.fullscreenElement;
        fsPath.setAttribute("d", isFs ? EXIT_FS : ENTER_FS);
        fsLabel.textContent = isFs ? "Exit fullscreen" : "Fullscreen";
      });
    </script>
  </body>
</html>
